<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NisrinArt Dashboard</title>
  //fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ungu:      #473642;
      --pink:      #d995b1;
      --pink-soft: #f0c4d9;
      --cream:     #fffaf8;
      --cream2:    #f5ede8;
      --sidebar-w: 240px;
      --topbar-h:  64px;
      --text:      #3a2d38;
      --muted:     #9b7d91;
      --border:    #e8d8e0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream2);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--ungu);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      z-index: 100;
      transition: transform 0.3s;
    }

    .sidebar-brand {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-brand .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-brand .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--pink), #c47ea0);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .sidebar-brand .brand-text h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }

    .sidebar-brand .brand-text span {
      font-size: 0.7rem;
      color: var(--pink-soft);
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 1.25rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .nav-section-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 0.6rem 0.5rem 0.3rem;
      margin-top: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
    }

    .nav-item.active {
      background: rgba(217,149,177,0.2);
      color: var(--pink-soft);
    }

    .nav-item .nav-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-item .badge-soon {
      margin-left: auto;
      font-size: 0.6rem;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      padding: 0.15rem 0.45rem;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar-footer {
      padding: 1rem 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: rgba(255,255,255,0.55);
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
