<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — NisrinArt Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --ungu:   #473642;
      --pink:   #d995b1;
      --pink-soft: #f0c4d9;
      --cream:  #fffaf8;
      --cream2: #f5ede8;
      --text:   #3a2d38;
      --muted:  #9b7d91;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream2);
      font-family: 'Nunito', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.18;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--pink);
      top: -120px; left: -120px;
    }
    body::after {
      width: 400px; height: 400px;
      background: var(--ungu);
      bottom: -100px; right: -100px;
    }

    .card {
      background: var(--cream);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(71,54,66,0.13);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .brand-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--pink), var(--ungu));
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ungu);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--pink), var(--ungu));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .back-link {
      display: block;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      color: var(--pink);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }

    .loading-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand-logo">N</div>
    <h1>NisrinArt Dashboard</h1>
    <p class="subtitle">Masuk untuk mengelola konten</p>

    <button class="btn-login" id="loginBtn">
      🔐 Masuk dengan Netlify Identity
    </button>

    <p class="loading-text" id="loadingText" style="display:none;">Memverifikasi sesi...</p>

    <p class="footer-note">NisrinArt &copy; 2026 &mdash; Admin only</p>
    <a href="../index.html" class="back-link">← Kembali ke website</a>
  </div>

  <script>
    // Cek apakah user sudah login — redirect langsung ke dashboard
    window.netlifyIdentity.on('init', function(user) {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('loadingText').style.display = 'block';
        window.location.href = './index.html';
      }
    });

    // Setelah login berhasil, redirect ke dashboard
    window.netlifyIdentity.on('login', function() {
      window.netlifyIdentity.close();
      window.location.href = './index.html';
    });

    // Buka modal login Netlify saat tombol diklik
    document.getElementById('loginBtn').addEventListener('click', function() {
      window.netlifyIdentity.open('login');
    });
  </script>

</body>
</html>
